<div *ngIf="state().show" class="modal-overlay">
  <div class="modal-card-container">
    
    <!-- SUCCESS ICON -->
    <div *ngIf="state().type === 'success'" class="icon-section success">
      <div class="icon-blur-bg"></div>
      <div class="icon-main success-gradient">
        <svg xmlns="http://www.w3.org/2000/svg" class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11a1 1 0 1 1-2 0 1 1 0 0 1 2 0z"/><path d="M17 11a1 1 0 1 1-2 0 1 1 0 0 1 2 0z"/><path d="M8 15a5 5 0 0 0 8 0"/></svg>
      </div>
      <div class="icon-badge success-badge">
        <svg class="badge-svg" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg>
      </div>
    </div>

    <!-- ERROR ICON -->
    <div *ngIf="state().type === 'error'" class="icon-section error">
      <div class="icon-blur-bg"></div>
      <div class="icon-main error-gradient">
        <svg xmlns="http://www.w3.org/2000/svg" class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 10a1 1 0 1 1-2 0 1 1 0 0 1 2 0z"/><path d="M17 10a1 1 0 1 1-2 0 1 1 0 0 1 2 0z"/><path d="M16 16a5 5 0 0 0-8 0"/></svg>
      </div>
      <div class="icon-badge error-badge">
        <svg class="badge-svg" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path></svg>
      </div>
    </div>

    <!-- CONFIRM ICON -->
    <div *ngIf="state().type === 'confirm'" class="icon-section confirm">
      <div class="icon-blur-bg"></div>
      <div class="icon-main confirm-gradient">
        <svg xmlns="http://www.w3.org/2000/svg" class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 10a1 1 0 1 1-2 0 1 1 0 0 1 2 0z"/><path d="M17 10a1 1 0 1 1-2 0 1 1 0 0 1 2 0z"/></svg>
      </div>
      <div class="icon-badge confirm-badge">
        <svg class="badge-svg" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
      </div>
    </div>

    <!-- WARNING ICON -->
    <div *ngIf="state().type === 'warning'" class="icon-section warning">
      <div class="icon-blur-bg"></div>
      <div class="icon-main warning-gradient">
        <svg xmlns="http://www.w3.org/2000/svg" class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 10a1 1 0 1 1-2 0 1 1 0 0 1 2 0z"/><path d="M17 10a1 1 0 1 1-2 0 1 1 0 0 1 2 0z"/><circle cx="13" cy="16" r="1.5"/></svg>
      </div>
      <div class="icon-badge warning-badge">
        <svg class="badge-svg" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
      </div>
    </div>

    <h3 class="modal-title">{{ state().title }}</h3>
    <p class="modal-message">{{ state().message }}</p>

    <!-- BUTTONS -->
    <div class="button-row">
      <!-- 2 Buttons -->
      <ng-container *ngIf="state().type === 'error' || state().type === 'confirm' || state().type === 'warning'">
        <button (click)="onCancel()" class="btn-cancel">
          {{ state().cancelText }}
        </button>
        <button *ngIf="state().type === 'error'" (click)="onConfirm()" class="btn-confirm error-btn">
          {{ state().confirmText }}
        </button>
        <button *ngIf="state().type === 'confirm'" (click)="onConfirm()" class="btn-confirm primary-btn">
          {{ state().confirmText }}
        </button>
        <button *ngIf="state().type === 'warning'" (click)="onConfirm()" class="btn-confirm warning-btn">
          {{ state().confirmText }}
        </button>
      </ng-container>

      <!-- 1 Button for Success -->
      <ng-container *ngIf="state().type === 'success'">
        <button (click)="onConfirm()" class="btn-confirm primary-btn success-single">
          {{ state().confirmText }}
        </button>
      </ng-container>
    </div>
  </div>
</div>
