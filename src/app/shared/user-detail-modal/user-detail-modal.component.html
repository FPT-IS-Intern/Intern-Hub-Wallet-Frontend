<div *ngIf="show" class="modal-overlay" (click)="onClose()">
  <div class="modal-container" (click)="$event.stopPropagation()">
    <!-- Modal Header -->
    <div class="modal-header">
      <div class="header-left">
        <div class="icon-circle amber">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
          </svg>
        </div>
        <div class="header-text">
          <h2 class="modal-title">Thông Tin Ví Người Dùng</h2>
          <p class="modal-subtitle">Chi tiết số dư và trạng thái tài khoản</p>
        </div>
      </div>
      <button class="close-btn" (click)="onClose()">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <!-- Modal Content -->
    <div class="modal-body" *ngIf="walletData">
      <!-- Address Section -->
      <div class="premium-address-section">
        <div class="section-label">ĐỊA CHỈ VÍ</div>
        <div class="address-box">
          <span class="address-text">{{ walletData.address }}</span>
          <button 
            class="copy-small-btn" 
            (click)="copyToClipboard(walletData.address, 'Đã copy địa chỉ ví')"
            title="Copy address"
          >
             <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
             </svg>
          </button>
        </div>
      </div>

      <!-- Balances Grid -->
      <div class="balances-grid">
        <div class="balance-item-card bt">
          <div class="balance-icon-amber">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
          </div>
          <div class="balance-info">
            <span class="token-name">Blockchain Token (BT)</span>
            <div class="token-amount">
                <span class="value">{{ formatBalance(walletData.bt) }}</span>
                <span class="unit">BT</span>
            </div>
          </div>
        </div>

        <div class="balance-item-card rt">
          <div class="balance-icon-green">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
          </div>
          <div class="balance-info">
            <span class="token-name">Rewards Token (RT)</span>
            <div class="token-amount">
                <span class="value">{{ formatBalance(walletData.rt) }}</span>
                <span class="unit">RT</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Locked Balance -->
      <div class="locked-banner-card">
        <div class="locked-left">
            <div class="lock-icon-box">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <div class="lock-text-box">
                <span class="lock-label">Số dư BT đang khóa</span>
            </div>
        </div>
        <div class="locked-value-box">
            <span class="value">{{ formatBalance(walletData.lockedBalance) }}</span>
            <span class="unit">BT</span>
        </div>
      </div>
    </div>

    <!-- Modal Footer -->
    <div class="modal-footer">
      <button class="footer-btn primary" (click)="onClose()">Đóng</button>
    </div>
  </div>
</div>
