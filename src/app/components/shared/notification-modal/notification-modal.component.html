<div *ngIf="state().show" class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm transition-opacity">
  <div class="relative w-[360px] bg-white rounded-[24px] shadow-xl p-6 text-center transform transition-all scale-100 animate-fade-in-up">
    
    <!-- SUCCESS ICON -->
    <div *ngIf="state().type === 'success'" class="mx-auto w-24 h-24 mb-4 relative flex items-center justify-center">
      <div class="absolute inset-0 bg-green-100 rounded-full blur-xl opacity-60"></div>
      <div class="relative w-20 h-20 bg-gradient-to-br from-green-300 to-green-500 rounded-full shadow-lg flex items-center justify-center text-white">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11a1 1 0 1 1-2 0 1 1 0 0 1 2 0z"/><path d="M17 11a1 1 0 1 1-2 0 1 1 0 0 1 2 0z"/><path d="M8 15a5 5 0 0 0 8 0"/></svg>
      </div>
      <div class="absolute -bottom-1 -right-1 w-8 h-8 bg-green-100 rounded-full flex items-center justify-center border-2 border-white shadow-sm">
        <svg class="w-5 h-5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg>
      </div>
    </div>

    <!-- ERROR ICON -->
    <div *ngIf="state().type === 'error'" class="mx-auto w-24 h-24 mb-4 relative flex items-center justify-center">
      <div class="absolute inset-0 bg-red-100 rounded-full blur-xl opacity-60"></div>
      <div class="relative w-20 h-20 bg-gradient-to-br from-red-400 to-red-600 rounded-full shadow-lg flex items-center justify-center text-white">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 10a1 1 0 1 1-2 0 1 1 0 0 1 2 0z"/><path d="M17 10a1 1 0 1 1-2 0 1 1 0 0 1 2 0z"/><path d="M16 16a5 5 0 0 0-8 0"/></svg>
      </div>
      <div class="absolute -bottom-1 -right-1 w-8 h-8 bg-red-100 rounded-full flex items-center justify-center border-2 border-white shadow-sm">
        <svg class="w-5 h-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path></svg>
      </div>
    </div>

    <!-- CONFIRM ICON -->
    <div *ngIf="state().type === 'confirm'" class="mx-auto w-24 h-24 mb-4 relative flex items-center justify-center">
      <div class="absolute inset-0 bg-blue-100 rounded-full blur-xl opacity-60"></div>
      <div class="relative w-20 h-20 bg-gradient-to-br from-blue-300 to-blue-500 rounded-full shadow-lg flex items-center justify-center text-white">
        <!-- Neutral face -->
        <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 10a1 1 0 1 1-2 0 1 1 0 0 1 2 0z"/><path d="M17 10a1 1 0 1 1-2 0 1 1 0 0 1 2 0z"/></svg>
      </div>
      <div class="absolute -bottom-1 -right-1 w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center border-2 border-white shadow-sm">
        <svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
      </div>
    </div>

    <!-- WARNING ICON -->
    <div *ngIf="state().type === 'warning'" class="mx-auto w-24 h-24 mb-4 relative flex items-center justify-center">
      <div class="absolute inset-0 bg-yellow-100 rounded-full blur-xl opacity-60"></div>
      <div class="relative w-20 h-20 bg-gradient-to-br from-yellow-300 to-yellow-500 rounded-full shadow-lg flex items-center justify-center text-white">
        <!-- Surprised / alert face -->
        <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 10a1 1 0 1 1-2 0 1 1 0 0 1 2 0z"/><path d="M17 10a1 1 0 1 1-2 0 1 1 0 0 1 2 0z"/><circle cx="13" cy="16" r="1.5"/></svg>
      </div>
      <div class="absolute -bottom-1 -right-1 w-8 h-8 bg-yellow-100 rounded-full flex items-center justify-center border-2 border-white shadow-sm">
        <svg class="w-5 h-5 text-yellow-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
      </div>
    </div>

    <h3 class="text-2xl font-bold text-gray-800 mb-2">{{ state().title }}</h3>
    <p class="text-[15px] text-gray-500 mb-8 px-2">{{ state().message }}</p>

    <!-- BUTTONS -->
    <div class="flex items-center justify-center gap-4">
      <!-- 2 Buttons -->
      <ng-container *ngIf="state().type === 'error' || state().type === 'confirm' || state().type === 'warning'">
        <button (click)="onCancel()" class="flex-1 py-2.5 px-4 rounded-xl border border-gray-300 text-gray-600 font-medium hover:bg-gray-50 transition-colors">
          {{ state().cancelText }}
        </button>
        <button *ngIf="state().type === 'error'" (click)="onConfirm()" class="flex-1 py-2.5 px-4 rounded-xl bg-red-600 text-white font-medium hover:bg-red-700 transition-colors shadow-md shadow-red-200">
          {{ state().confirmText }}
        </button>
        <button *ngIf="state().type === 'confirm'" (click)="onConfirm()" class="flex-1 py-2.5 px-4 rounded-xl bg-[#dc7609] text-white font-medium hover:bg-[#c06606] transition-colors shadow-md shadow-orange-200">
          {{ state().confirmText }}
        </button>
        <button *ngIf="state().type === 'warning'" (click)="onConfirm()" class="flex-1 py-2.5 px-4 rounded-xl bg-yellow-500 text-white font-medium hover:bg-yellow-600 transition-colors shadow-md shadow-yellow-200">
          {{ state().confirmText }}
        </button>
      </ng-container>

      <!-- 1 Button for Success -->
      <ng-container *ngIf="state().type === 'success'">
        <button (click)="onConfirm()" class="w-2/3 py-2.5 px-4 rounded-xl bg-[#dc7609] text-white font-medium hover:bg-[#c06606] transition-colors shadow-md shadow-orange-200">
          {{ state().confirmText }}
        </button>
      </ng-container>

    </div>
  </div>
</div>

<style>
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(10px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .animate-fade-in-up {
    animation: fadeInUp 0.25s ease-out forwards;
  }
</style>
