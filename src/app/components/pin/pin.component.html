<div class="min-h-screen bg-[#FCF4E0] flex items-center justify-center p-4 font-sans text-[#4A4A4A]">
  <div class="max-w-md w-full animate-in fade-in slide-in-from-bottom-4 duration-700">
    <div class="bg-white rounded-[2.5rem] p-8 md:p-12 shadow-[0_20px_50px_rgba(225,131,8,0.1)] border border-amber-100/50 relative overflow-hidden group">
      <!-- Decorative Element -->
      <div class="absolute top-0 right-0 w-40 h-40 bg-amber-50 rounded-full -mr-20 -mt-20 opacity-50 transition-transform duration-700 group-hover:scale-110"></div>
      
      <div class="relative z-10">
        <!-- Logo/Icon area -->
        <div class="flex flex-col items-center mb-10 text-center">
          <div class="w-20 h-20 bg-amber-100 rounded-3xl flex items-center justify-center text-amber-600 mb-6 shadow-sm">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
            </svg>
          </div>
          <h1 class="text-3xl font-extrabold text-amber-900 tracking-tight mb-2">Bảo Mật Ví</h1>
          <p class="text-gray-400 text-sm max-w-[240px]">Vui lòng thiết lập mã PIN 6 số để bảo vệ tài khoản ví của bạn.</p>
        </div>

        <!-- PIN Form -->
        <form (ngSubmit)="onSubmit()" class="space-y-8">
          <div class="space-y-6">
            <div class="space-y-2">
              <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest ml-1">Mã PIN mới</label>
              <div class="relative">
                <input 
                  type="password" 
                  [(ngModel)]="pin" 
                  (ngModelChange)="onPinChange('pin')"
                  (keypress)="blockNonNumeric($event)"
                  name="pin"
                  maxlength="6"
                  inputmode="numeric"
                  placeholder="••••••"
                  class="w-full bg-gray-50 border border-gray-100 px-6 py-4 rounded-2xl text-2xl tracking-[0.5em] font-mono focus:outline-none focus:ring-4 focus:ring-amber-500/10 focus:border-amber-500/50 transition-all text-center placeholder:tracking-normal placeholder:font-sans"
                >
              </div>
            </div>

            <div class="space-y-2">
              <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest ml-1">Xác nhận mã PIN</label>
              <div class="relative">
                <input 
                  type="password" 
                  [(ngModel)]="confirmPin" 
                  (ngModelChange)="onPinChange('confirmPin')"
                  (keypress)="blockNonNumeric($event)"
                  name="confirmPin"
                  maxlength="6"
                  inputmode="numeric"
                  placeholder="••••••"
                  class="w-full bg-gray-50 border border-gray-100 px-6 py-4 rounded-2xl text-2xl tracking-[0.5em] font-mono focus:outline-none focus:ring-4 focus:ring-amber-500/10 focus:border-amber-500/50 transition-all text-center placeholder:tracking-normal placeholder:font-sans"
                >
              </div>
            </div>
          </div>

          <button 
            type="submit"
            [disabled]="loading"
            class="w-full bg-[#E18308] hover:bg-[#C17007] text-white font-bold py-5 rounded-2xl shadow-xl shadow-amber-600/20 transition-all active:scale-[0.98] disabled:opacity-75 disabled:pointer-events-none group-hover:translate-y-[-2px]"
          >
            <div class="flex items-center justify-center gap-3">
              <svg *ngIf="loading" class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
              <span class="text-lg">{{ loading ? 'Cang khởi tạo ví...' : 'Tạo Ví Ngay' }}</span>
            </div>
          </button>
        </form>

        <!-- Extra info -->
        <div class="mt-10 flex items-center justify-center gap-2 text-gray-400">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
          </svg>
          <span class="text-xs">Bảo mật đa lớp tiêu chuẩn quân đội</span>
        </div>
      </div>
    </div>
  </div>
</div>
