server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # ==========================================================
    # PROXY CONFIGURATION - Reversing proxy.conf.json
    # ==========================================================
    location /wl/ {
        # Target from proxy.conf.json
        proxy_pass https://internhub-v2.bbtech.io.vn/api/;

        # Necessary headers to handle changeOrigin: true
        proxy_set_header Host internhub-v2.bbtech.io.vn;
        proxy_ssl_server_name on;
        
        # Standard proxy optimizations
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==========================================================
    # CACHE CONTROL - Static Assets
    # ==========================================================
    
    # 1. LONG CACHE: JS and CSS (hashed filenames)
    location ~* \.(js|css)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    # 2. MEDIUM CACHE: Images, fonts, media (7 days)
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        add_header Cache-Control "public, max-age=604800" always;
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    # ==========================================================
    # DEFAULT ROUTING - Angular SPA
    # ==========================================================
    location / {
        try_files $uri $uri/ /index.html;

        # SECURITY HEADERS
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline' 'unsafe-eval'" always;

        # NO CACHE FOR index.html
        add_header Cache-Control "no-cache" always;
        
        # CORS
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
